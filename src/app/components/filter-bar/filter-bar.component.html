<div class="sticky top-[57px] md:top-[61px] z-30 bg-white/95 backdrop-blur-md border-b border-gray-200 shadow-sm transition-all duration-200">
  <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
    <!-- Main filter bar: Type pills and Filter Toggle -->
    <div class="flex items-center justify-between gap-4">
      <!-- Scrollable Types list -->
      <div class="flex flex-1 items-center gap-2 overflow-x-auto pb-1 md:pb-0 scrollbar-none">
        @for (type of types(); track type) {
          <button
            type="button"
            (click)="selectType(type)"
            [ngClass]="{
              'bg-brand-600 text-white shadow-sm ring-1 ring-brand-600': propertyService.filters().type === type,
              'bg-brand-50/50 text-brand-800 hover:bg-brand-100/80 ring-1 ring-brand-100/50': propertyService.filters().type !== type
            }"
            class="shrink-0 rounded-full px-5 py-2 text-sm font-semibold transition-all duration-200 active:scale-[0.98]"
          >
            {{ type }}
          </button>
        }
      </div>

      <!-- Filtros Toggle Button -->
      <button
        type="button"
        (click)="toggleExtraFilters()"
        [ngClass]="{
          'border-brand-600 bg-brand-50 text-brand-700 font-semibold ring-1 ring-brand-600/30': showExtraFilters() || hasActiveExtraFilters(),
          'border-gray-200 bg-white text-gray-700 hover:bg-gray-50': !showExtraFilters() && !hasActiveExtraFilters()
        }"
        class="flex shrink-0 items-center gap-2 rounded-full border px-5 py-2 text-sm font-medium transition-all duration-200 active:scale-[0.98]"
      >
        <svg lucideSlidersHorizontal [size]="16" class="shrink-0"></svg>
        <span>Filtros</span>
        @if (hasActiveExtraFilters()) {
          <span class="flex h-2 w-2 rounded-full bg-brand-600 animate-pulse"></span>
        }
      </button>
    </div>

    <!-- Extra Collapsible Filters Section -->
    @if (showExtraFilters()) {
      <div class="mt-4 border-t border-gray-100 pt-4 animate-fade-in">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 max-w-xl">
          <!-- Max Price Dropdown -->
          <div>
            <label for="maxPrice" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
              Preço máximo
            </label>
            <div class="relative">
              <select
                id="maxPrice"
                [value]="propertyService.filters().maxPrice || ''"
                (change)="changeMaxPrice($event)"
                class="input-field appearance-none pr-10 cursor-pointer"
              >
                <option value="" [selected]="!propertyService.filters().maxPrice">Qualquer</option>
                @for (price of priceOptions(); track price) {
                  <option [value]="price" [selected]="propertyService.filters().maxPrice === price">
                    {{ formatPrice(price) }}
                  </option>
                }
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
                <svg lucideChevronDown [size]="16" class="text-gray-400"></svg>
              </div>
            </div>
          </div>

          <!-- Minimum Bedrooms Dropdown -->
          <div>
            <label for="bedrooms" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
              Quartos mínimos
            </label>
            <div class="relative">
              <select
                id="bedrooms"
                [value]="propertyService.filters().bedrooms || ''"
                (change)="changeBedrooms($event)"
                class="input-field appearance-none pr-10 cursor-pointer"
              >
                <option value="" [selected]="!propertyService.filters().bedrooms">Qualquer</option>
                @for (bedrooms of bedroomOptions(); track bedrooms) {
                  <option [value]="bedrooms" [selected]="propertyService.filters().bedrooms === bedrooms">
                    {{ bedrooms }}+ {{ bedrooms === 1 ? 'Quarto' : 'Quartos' }}
                  </option>
                }
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
                <svg lucideChevronDown [size]="16" class="text-gray-400"></svg>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
