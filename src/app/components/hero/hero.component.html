<section class="relative overflow-hidden bg-gradient-to-br from-brand-600 via-brand-700 to-brand-900 px-4 py-20">
  <div class="pointer-events-none absolute -bottom-24 -left-24 h-72 w-72 rounded-full bg-brand-400/30 blur-3xl"></div>
  <div class="pointer-events-none absolute -right-24 -top-24 h-72 w-72 rounded-full bg-accent-400/20 blur-3xl"></div>

  <div class="relative mx-auto max-w-3xl text-center">
    <p class="mb-3 text-sm font-medium uppercase tracking-wide text-brand-100">
      Catálogo de imóveis para alugar
    </p>
    <h1 class="mb-4 text-4xl font-extrabold leading-tight text-white sm:text-5xl">
      Encontre seu lar ideal
    </h1>
    <p class="mb-8 text-lg text-brand-100">
      Milhares de imóveis disponíveis em todo o Brasil. Contato direto com o proprietário.
    </p>

    <div class="flex items-center gap-2 rounded-2xl bg-white p-2 shadow-2xl">
      <div class="flex flex-1 items-center gap-2 px-3">
        <svg lucideSearch [size]="20" class="shrink-0 text-gray-400"></svg>
        <input
          type="text"
          [value]="searchTerm()"
          (input)="onSearchInput($any($event.target).value)"
          placeholder="Buscar por cidade..."
          class="flex-1 bg-transparent text-sm text-gray-900 outline-none placeholder:text-gray-400"
        />
        @if (searchTerm()) {
          <button type="button" (click)="clearSearch()" class="text-gray-400 hover:text-gray-600" aria-label="Limpar busca">
            <svg lucideX [size]="16"></svg>
          </button>
        }
      </div>
      <button type="button" class="btn-primary !px-6 !py-2.5 shrink-0 text-sm">Buscar</button>
    </div>

    <div class="mt-10 flex justify-center gap-10">
      @for (stat of stats; track stat.label; let first = $first) {
        @if (!first) {
          <div class="w-px bg-brand-400/40"></div>
        }
        <div class="text-center">
          <p class="text-2xl font-bold text-white">{{ stat.value }}</p>
          <p class="mt-0.5 text-xs text-brand-100">{{ stat.label }}</p>
        </div>
      }
    </div>
  </div>
</section>
