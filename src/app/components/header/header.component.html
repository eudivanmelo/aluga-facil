<header class="sticky top-0 z-40 border-b border-gray-100 bg-white/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a routerLink="/" class="flex items-center gap-2 shrink-0" (click)="closeMobileMenu()">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-brand-600 text-white shadow-sm">
        <img src="house-logo.svg" alt="AlugaFácil Logo" class="h-7 w-7" />
      </div>
      <span class="text-lg font-extrabold tracking-tight text-gray-900">Aluga<span class="text-brand-600">Fácil</span></span>
    </a>

    <nav class="hidden items-center gap-1 md:flex">
      <a routerLink="/" routerLinkActive="bg-brand-50 text-brand-700" [routerLinkActiveOptions]="{ exact: true }"
         class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100">
        Início
      </a>
      <a routerLink="/mapa" routerLinkActive="bg-brand-50 text-brand-700"
         class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100">
        Mapa
      </a>
      @if (isAuthenticated()) {
        <a routerLink="/imoveis/novo" routerLinkActive="bg-brand-50 text-brand-700"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100">
          Anunciar imóvel
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      @if (isAuthenticated()) {
        <div class="relative hidden md:block">
          <button
            (click)="toggleUserMenu()"
            class="flex items-center gap-2 rounded-full border border-gray-200 py-1 pl-1 pr-3 transition-colors hover:bg-gray-50"
          >
            <span class="flex h-8 w-8 items-center justify-center rounded-full bg-brand-100 text-xs font-bold text-brand-700">
              {{ initials() }}
            </span>
            <span class="text-sm font-medium text-gray-700">{{ currentUser()?.name?.split(' ')?.[0] }}</span>
          </button>

          @if (userMenuOpen()) {
            <div class="animate-scale-in absolute right-0 mt-2 w-56 origin-top-right rounded-xl border border-gray-100 bg-white p-1.5 shadow-lg">
              <a routerLink="/perfil" (click)="toggleUserMenu()"
                 class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">
                <svg lucideUser [size]="16"></svg> Meu perfil
              </a>
              <a routerLink="/imoveis/novo" (click)="toggleUserMenu()"
                 class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">
                <svg lucidePlus [size]="16"></svg> Anunciar imóvel
              </a>
              <hr class="my-1 border-gray-100" />
              <button (click)="logout()"
                 class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-left text-sm text-red-600 hover:bg-red-50">
                <svg lucideLogOut [size]="16"></svg> Sair
              </button>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/login" class="btn-ghost hidden !px-3 !py-2 text-sm md:inline-flex">Entrar</a>
        <a routerLink="/cadastro" class="btn-primary hidden !px-4 !py-2 text-sm md:inline-flex">Criar conta</a>
      }

      <button (click)="toggleMobileMenu()" class="rounded-lg p-2 text-gray-600 hover:bg-gray-100 md:hidden" aria-label="Abrir menu">
        <svg [lucideIcon]="mobileMenuOpen() ? icons.LucideX : icons.LucideMenu" [size]="22"></svg>
      </button>
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <div class="animate-fade-in-up border-t border-gray-100 bg-white px-4 py-3 md:hidden">
      <nav class="flex flex-col gap-1">
        <a routerLink="/" (click)="closeMobileMenu()" class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Início</a>
        <a routerLink="/mapa" (click)="closeMobileMenu()" class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Mapa</a>
        @if (isAuthenticated()) {
          <a routerLink="/imoveis/novo" (click)="closeMobileMenu()" class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Anunciar imóvel</a>
          <a routerLink="/perfil" (click)="closeMobileMenu()" class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Meu perfil</a>
          <button (click)="logout()" class="rounded-lg px-3 py-2.5 text-left text-sm font-medium text-red-600 hover:bg-red-50">Sair</button>
        } @else {
          <a routerLink="/login" (click)="closeMobileMenu()" class="rounded-lg px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Entrar</a>
          <a routerLink="/cadastro" (click)="closeMobileMenu()" class="rounded-lg bg-brand-50 px-3 py-2.5 text-sm font-semibold text-brand-700 hover:bg-brand-100">Criar conta</a>
        }
      </nav>
    </div>
  }
</header>
